<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>游戏图鉴中心</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 30%, #0d1b2a 60%, #1b0a2e 100%);
    }
    .stars {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      z-index: -1;
    }
    .subtitle {
      text-align: center;
      color: rgba(255,255,255,0.6);
      font-size: 1.1em;
      margin-top: -10px;
      margin-bottom: 40px;
      letter-spacing: 2px;
    }
    .btn-arknights {
      background: linear-gradient(135deg, rgba(30,30,60,0.8), rgba(60,60,120,0.6));
      border-color: rgba(120,150,255,0.5);
    }
    .btn-arknights:hover {
      box-shadow: 0 20px 60px rgba(80,120,255,0.5);
    }
    .btn-genshin {
      background: linear-gradient(135deg, rgba(40,20,20,0.8), rgba(80,40,20,0.6));
      border-color: rgba(255,180,80,0.5);
    }
    .btn-genshin:hover {
      box-shadow: 0 20px 60px rgba(255,160,60,0.5);
    }
    .btn-umamusume {
      background: linear-gradient(135deg, rgba(20,40,20,0.8), rgba(40,70,40,0.6));
      border-color: rgba(100,200,120,0.5);
    }
    .btn-umamusume:hover {
      box-shadow: 0 20px 60px rgba(80,200,100,0.5);
    }
    .btn-logo {
      width: 150px;
      height: 150px;
      object-fit: contain;
      margin-bottom: 10px;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5));
      transition: transform 0.3s;
    }
    .game-btn:hover .btn-logo {
      transform: scale(1.12);
    }
  </style>
</head>
<body>
  <canvas class="stars" id="stars"></canvas>
  <div class="content">
    <h1>🎮 游戏图鉴中心</h1>
    <p class="subtitle">选择一个游戏开始管理你的图鉴</p>
    <div class="main-container">
      <a href="arknights/" class="game-btn btn-arknights">
        <img src="images/arknights-logo.png" alt="明日方舟" class="btn-logo">
        <span>明日方舟</span>
      </a>
      <a href="genshin/" class="game-btn btn-genshin">
        <img src="images/genshin-logo.png" alt="原神" class="btn-logo">
        <span>原神</span>
      </a>
      <a href="umamusume/" class="game-btn btn-umamusume">
        <img src="images/umamusume-logo.png" alt="赛马娘" class="btn-logo">
        <span>赛马娘</span>
      </a>
    </div>
  </div>
  <script>
    // Starry background animation
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const stars = Array.from({length: 150}, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.5 + 0.5,
      v: Math.random() * 0.3 + 0.1
    }));
    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#fff';
      stars.forEach(s => {
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
        s.y -= s.v;
        if (s.y < 0) { s.y = canvas.height; s.x = Math.random() * canvas.width; }
      });
      requestAnimationFrame(animate);
    }
    animate();
    window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
  </script>
</body>
</html>
